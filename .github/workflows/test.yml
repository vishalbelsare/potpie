name: Regression tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.0"

      - name: Install dependencies
        run: uv sync --frozen --no-cache

      - name: Run test suite with coverage
        env:
          SKIP_REAL_PARSE: "1"
          POSTGRES_SERVER: "postgresql://postgres:postgres@localhost:5432/postgres"
          ENV: "development"
          REDISHOST: "localhost"
          REDISPORT: "6379"
          SENTRY_CLIENT_ID: "ci-dummy"
          SENTRY_CLIENT_SECRET: "ci-dummy"
        run: uv run python scripts/run_tests.py --coverage

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
